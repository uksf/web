<app-autofocus-stop></app-autofocus-stop>
<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>
    <div class="flex-container">
        <div class="title-container" [ngClass]="{ error: message.error }">
            @if (messages.length > 1) {
            <button mat-mini-fab color="accent" (click)="previous()" matTooltip="Previous">
                <mat-icon class="icon-right">navigate_before</mat-icon>
            </button>
            }
            <app-flex-filler></app-flex-filler>
            <span [innerHtml]="message.title"></span>
            <app-flex-filler></app-flex-filler>
            @if (messages.length > 1) {
            <button mat-mini-fab color="accent" (click)="next()" matTooltip="Next">
                <mat-icon class="icon-right">navigate_next</mat-icon>
            </button>
            }
        </div>
        <div #messageBox class="message-container">
            <p [innerHtml]="message.detail"></p>
        </div>
    </div>
</mat-dialog-content>
<mat-dialog-actions>
    <button mat-raised-button color="primary" (click)="dialog.close()">Close</button>
</mat-dialog-actions>
