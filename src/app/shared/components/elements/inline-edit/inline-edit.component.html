<div>
    @if (editing) {
    <div>
        <input #inlineEditControl [required]="required" (blur)="unfocus()" [name]="value" [(ngModel)]="value" [type]="type" [placeholder]="label" [class.invalid]="invalid" />
    </div>
    } @else {
    <div>
        <span class="bold">{{ label }}</span>
        <button type="button" title="Click to edit" (click)="edit(value)" (focus)="edit(value)" class="inline-edit">{{ value }}</button>
    </div>
    }
</div>
