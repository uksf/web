<div class="board-page">
    @if (accessDenied) {
        <div class="access-denied">
            <mat-icon>lock</mat-icon>
            <h2>You don't have access to this board</h2>
            <button mat-raised-button (click)="goBack()">Back to Boards</button>
        </div>
    } @else if (board) {
        <div class="board-header">
            <div class="board-header-left">
                <button mat-icon-button (click)="goBack()" matTooltip="Back to boards">
                    <mat-icon>arrow_back</mat-icon>
                </button>
                <h1>{{ board.name }}</h1>
            </div>
            <div class="board-header-actions">
                <app-text-input class="new-card-field" placeholder="New card title" [(ngModel)]="newCardTitle" [reserveErrorSpace]="false" (keypress)="onNewCardKeyPress($event)"></app-text-input>
                <button mat-raised-button color="primary" (click)="createCard()" [disabled]="!newCardTitle.trim()">Add</button>
                <ng-template [ngxPermissionsOnly]="['ADMIN']">
                    <button mat-icon-button (click)="openSettings()" matTooltip="Board settings">
                        <mat-icon>settings</mat-icon>
                    </button>
                </ng-template>
            </div>
        </div>
        <div class="board-columns" cdkDropListGroup>
            @for (column of board.columns; track column.key) {
                <app-board-column
                    [column]="column"
                    [boardId]="boardId"
                    [allDropLists]="allDropLists"
                    (openCard)="openCard($event)"
                    (loadMore)="loadMoreDone()"
                    (dropped)="onDrop($event)">
                </app-board-column>
            }
        </div>
    }
</div>
