<div class="log-modal-header">
    <h2 class="log-title">RPT Log</h2>
    <div class="source-buttons">
        @for (source of sources; track source.name) {
            <button mat-flat-button
                    color="primary"
                    [disabled]="source.name === activeSource"
                    (click)="switchSource(source.name)"
                    [matTooltip]="source.isServer ? 'Server log' : source.name + ' log'">
                {{ source.isServer ? server.name : source.name }}
            </button>
        }
    </div>
    <button mat-icon-button (click)="toggleTail()" [class.tail-active]="tailEnabled" [matTooltip]="tailEnabled ? 'Stop following' : 'Follow tail'">
        <mat-icon>vertical_align_bottom</mat-icon>
    </button>
    <div class="search-bar">
        <app-text-input
            placeholder="Search log..."
            [reserveErrorSpace]="false"
            [clearable]="true"
            [(ngModel)]="searchQuery"
            (ngModelChange)="onSearchChange()"
            (cleared)="onSearchChange()">
        </app-text-input>
        <span class="search-count" [class.search-count-no-match]="searchQuery.trim() && !searchResults.length">
            @if (searchResults.length) {
                {{ currentSearchIndex + 1 }} of {{ totalMatches }}
            } @else {
                No results
            }
        </span>
        <button mat-icon-button color="primary" (click)="searchPrev()" [disabled]="!searchResults.length" matTooltip="Previous match">
            <mat-icon>keyboard_arrow_up</mat-icon>
        </button>
        <button mat-icon-button color="primary" (click)="searchNext()" [disabled]="!searchResults.length" matTooltip="Next match">
            <mat-icon>keyboard_arrow_down</mat-icon>
        </button>
    </div>
    <button mat-icon-button (click)="downloadLog()" [disabled]="isDownloading" matTooltip="Download log file">
        <mat-icon>download</mat-icon>
    </button>
    <button mat-icon-button (click)="close()" matTooltip="Close">
        <mat-icon>close</mat-icon>
    </button>
</div>
<div class="log-content">
    @if (isLoading) {
        <div class="log-loading">Loading log...</div>
    } @else if (!logLines.length) {
        <div class="log-empty">No log files found for this server.</div>
    } @else {
        <div class="log-viewport-wrapper">
            <cdk-virtual-scroll-viewport [itemSize]="20" class="log-viewport">
                <div *cdkVirtualFor="let line of highlightedLines; let i = index; trackBy: trackByIndex"
                     class="log-line"
                     [class.search-highlight]="isSearchMatch(i)"
                     [class.search-active]="isActiveSearchMatch(i)"
                     [class.linked-line]="i === linkedLineIndex"
                     (click)="onLineClick(i)">
                    <span class="line-number" (click)="copyLineLink($event, i)" matTooltip="Copy link to line">{{ i + 1 }}</span>
                    <span class="line-content" [innerHTML]="line"></span>
                </div>
            </cdk-virtual-scroll-viewport>
            <app-log-minimap
                [logLines]="logLines"
                [searchResults]="searchResults"
                [searchQuery]="searchQuery"
                [currentSearchIndex]="currentSearchIndex"
                [viewportOffset]="viewportScrollOffset"
                [viewportSize]="viewportVisibleSize"
                [totalHeight]="totalScrollHeight"
                [itemSize]="20"
                (scrollToLine)="onMinimapScrollToLine($event)"
                (scrollToOffset)="onMinimapScrollToOffset($event)">
            </app-log-minimap>
        </div>
    }
</div>
