<app-default-content-areas>
    <app-full-content-area>
        <div class="hdr">
            <h2>Campaigns</h2>
            <span class="spacer"></span>
            <ng-template [ngxPermissionsOnly]="['COMMAND']">
                <button mat-raised-button color="primary" (click)="createCampaign()"><mat-icon>add</mat-icon> New campaign</button>
            </ng-template>
        </div>

        <div class="cards">
            @for (campaign of campaigns; track campaign.id) {
                <a class="campaign-card" [routerLink]="[campaign.id]" [style.--stripe]="stripe(campaign)">
                    @if (campaign.theatre) {
                        <span class="theatre">{{ theatre(campaign) }}</span>
                    }
                    <div class="grow">
                        <div class="title">{{ campaign.name }}</div>
                        <div class="sub" [class.muted]="summary(campaign) === 'Archived'">{{ summary(campaign) }}</div>
                    </div>
                    <mat-icon class="chev">chevron_right</mat-icon>
                </a>
            } @empty {
                <p class="empty">No campaigns yet</p>
            }
        </div>
    </app-full-content-area>
</app-default-content-areas>
