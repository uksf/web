<app-default-content-areas>
    <app-full-content-area>
        <div class="hdr">
            <h2>Campaigns</h2>
            <span class="spacer"></span>
            <ng-template [ngxPermissionsOnly]="['COMMAND']">
                <button mat-raised-button color="primary" (click)="createCampaign()">New campaign</button>
            </ng-template>
        </div>

        @for (section of sections; track section.title) {
            <div class="section">
                <div class="sec">
                    <h3>{{ section.title }}</h3>
                    <span class="rule"></span>
                </div>
                <div class="cards" [class.muted]="section.muted">
                    @for (campaign of section.items; track campaign.id) {
                        <a
                            class="campaign-card"
                            [routerLink]="[campaign.id]"
                            [class.current]="campaign.status === CampaignStatus.Current"
                            [class.upcoming]="campaign.status === CampaignStatus.Upcoming"
                            [class.past]="campaign.status === CampaignStatus.Past"
                        >
                            @if (theatre(campaign)) {
                                <span class="theatre">{{ theatre(campaign) }}</span>
                            }
                            <div class="grow">
                                <div class="title">{{ campaign.name }}</div>
                            </div>
                            <mat-icon class="chev">chevron_right</mat-icon>
                        </a>
                    }
                </div>
            </div>
        } @empty {
            <p class="empty">No campaigns yet</p>
        }
    </app-full-content-area>
</app-default-content-areas>
