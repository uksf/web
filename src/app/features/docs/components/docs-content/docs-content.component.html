@if (!documentMetadata) {
<div class="content-placeholder">
    <h3>Select a document from the left</h3>
</div>
} @if (documentMetadata) {
<div class="content-container">
    <div class="content-header">
        <span class="document-title">{{ documentMetadata.name }}</span>
        @if (documentMetadata.canWrite && documentContent) {
        <div class="buttons-container">
            @if (!editing) {
            <app-button (clicked)="edit()">Edit</app-button>
            } @if (editing) {
            <app-button (clicked)="save()" [disabled]="false" [pending]="pending">Save</app-button>
            }
        </div>
        }
    </div>
    @if (documentContent) {
    <div #editorBounds class="content">
        @if (!editing) {
        <quill-view [content]="documentContent.text" [preserveWhitespace]="true" class="content-view" format="json"></quill-view>
        } @if (editing) {
        <quill-editor
            (onContentChanged)="onContentChanged($event)"
            [(ngModel)]="documentContent.text"
            [bounds]="editorBounds"
            [preserveWhitespace]="true"
            class="content-editor"
            format="json"
            placeholder=""
        ></quill-editor>
        }
    </div>
    }
</div>
}
