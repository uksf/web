<div class="nav-bar">
    <nav mat-tab-nav-bar [tabPanel]="tabPanel" aria-label="navigation links">
        @for (tabLink of tabLinks; track trackByLink(i, tabLink); let i = $index) {
        <a mat-tab-link [routerLink]="tabLink.link" routerLinkActive #rla="routerLinkActive" [active]="rla.isActive ? true : null">
            {{ tabLink.label }}
        </a>
        }
    </nav>
</div>

<mat-tab-nav-panel #tabPanel>
    <router-outlet></router-outlet>
</mat-tab-nav-panel>
