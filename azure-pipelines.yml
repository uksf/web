trigger:
  batch: true
  branches:
    include:
      - main

pool: Avengers

variables:
  buildOutput: '$(Build.SourcesDirectory)\dist\browser'

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build
        steps:
          - checkout: self
            clean: false

          - task: NodeTool@0
            inputs:
              versionSpec: '22.x'
            displayName: 'Install Node.js'

          - script: |
              bun install --frozen-lockfile
            displayName: 'bun install'

          - script: |
              bun run test
            displayName: 'Unit Tests'
            env:
              CI: 'true'

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/junit.xml'
            condition: succeededOrFailed()

          - task: PowerShell@2
            displayName: 'Check Storybook changes'
            inputs:
              targetType: 'inline'
              script: |
                $changes = git diff HEAD~1 --name-only -- '*.stories.ts' '*.stories.spec.ts' '*.component.ts' '*.component.html' '*.component.scss' '.storybook/**' 'src/styles/**' 'src/*.scss' 'angular.json' 'playwright-storybook.config.ts'
                if ($changes) {
                    Write-Host "Storybook-relevant changes detected"
                    Write-Host "##vso[task.setvariable variable=storybookNeeded]true"
                } else {
                    Write-Host "No storybook-relevant changes, skipping"
                    Write-Host "##vso[task.setvariable variable=storybookNeeded]false"
                }

          - script: |
              bun run build-storybook
            displayName: 'Build Storybook'
            condition: eq(variables.storybookNeeded, 'true')
            env:
              CI: 'true'

          - script: |
              npx playwright install chromium
            displayName: 'Install Playwright Browsers'
            condition: eq(variables.storybookNeeded, 'true')

          - script: |
              bun run test:storybook
            displayName: 'Storybook Tests'
            condition: eq(variables.storybookNeeded, 'true')
            env:
              CI: 'true'

          - task: PublishTestResults@2
            displayName: 'Publish Storybook Test Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/storybook-junit.xml'
              testRunTitle: 'Storybook Tests'
            condition: and(succeededOrFailed(), eq(variables.storybookNeeded, 'true'))

          - script: |
              bun x ng build -c production
            displayName: 'ng build'

  - template: templates/deploy-web.yml
    parameters:
      environment: Dev
      deployPath: 'C:\Server\Nginx\html-dev'
      apiUrl: 'https://api-dev.uk-sf.co.uk'
      variableGroup: UKSF Web - Dev
      dependsOn: Build

  - template: templates/deploy-web.yml
    parameters:
      environment: Prod
      deployPath: 'C:\Server\Nginx\html'
      apiUrl: 'https://api.uk-sf.co.uk'
      variableGroup: UKSF Web - Production
      dependsOn: DeployDev
